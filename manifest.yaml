version: 0.0.1
type: plugin
author: "local"
name: text_fitter
label:
  en_US: Text Fitter
  zh_Hans: 文本字数适配器
description:
  en_US: >
    Smart text trimming tool for context window constraints. Calculates text
    length, intelligently extracts key sentences when text exceeds a configurable
    character threshold, or passes text through unchanged when within limits.
  zh_Hans: >
    用于上下文窗口限制的智能文本裁剪工具。计算文本长度，
    当文本超过可配置的字符阈值时智能提取关键句，未超限时直接透传。
icon: icon.svg
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
plugins:
  tools:
    - provider/text_fitter.yaml
meta:
  version: 0.0.1
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
created_at: "2026-05-21T00:00:00.000000Z"
tags:
  - text-processing
  - utility
