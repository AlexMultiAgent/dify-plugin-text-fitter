description:
  human:
    en_US: >
      Calculates text length and ensures it fits within a configurable character
      limit. If the text exceeds the limit, intelligently extracts the most
      important sentences using extractive summarization. Otherwise, passes the
      text through unchanged. Supports Chinese, Japanese, and English input.
    zh_Hans: >
      计算文本长度，确保其不超出可配置的字符限制。文本超限时通过抽取式摘要
      智能提取关键句，未超限时直接透传原文。支持中、日、英文文本。
    ja_JP: >
      テキスト長を計算し、設定可能な文字数制限内に収めます。制限を超えた場合、
      抽出型要約で重要な文を抽出し、制限内の場合はそのまま通過します。
      中国語、日本語、英語に対応。
  llm: >
    A tool that checks whether the input text exceeds a configurable character
    limit. If it does, intelligently extracts the most important sentences
    using extractive summarization with MMR diversity penalty to reduce
    redundancy. Handles abbreviations (Mr., Dr. etc.) and CJK/English
    punctuation correctly. Supports Chinese, Japanese, and English text.
    Outputs the processed text plus metadata: original_char_count,
    processed_char_count, and was_trimmed.
extra:
  python:
    source: tools/smart_trim.py
identity:
  author: alex
  name: smart_trim
  label:
    en_US: Smart Trim
    zh_Hans: 智能裁剪
    ja_JP: スマートトリム
parameters:
  - name: text
    type: string
    required: true
    label:
      en_US: Input Text
      zh_Hans: 输入文本
      ja_JP: 入力テキスト
    human_description:
      en_US: The text to be checked and trimmed.
      zh_Hans: 需要检查和裁剪的文本。
      ja_JP: チェックとトリミングを行うテキスト。
    llm_description: The text content to be checked and processed.
    form: llm
  - name: max_chars
    type: number
    required: true
    default: 30000
    label:
      en_US: Maximum Characters
      zh_Hans: 最大字符数
      ja_JP: 最大文字数
    human_description:
      en_US: >
        The character limit. Text exceeding this will be trimmed. Set this based
        on your LLM's actual context window (e.g. --max-model-len 25000 means
        ~25000 tokens; set max_chars conservatively lower).
      zh_Hans: >
        字符数阈值。超过此限制的文本将被裁剪。请根据LLM实际上下文窗口设置
        （如 --max-model-len 25000 表示约25000 tokens，需保守设置）。
      ja_JP: >
        文字数のしきい値。これを超えるテキストはトリミングされます。
        LLMの実際のコンテキストウィンドウに基づいて設定してください。
    llm_description: Maximum allowed character count before trimming is triggered.
    form: llm
  - name: selection_method
    type: string
    required: false
    default: greedy
    label:
      en_US: Selection Method
      zh_Hans: 选择算法
      ja_JP: 選択アルゴリズム
    human_description:
      en_US: >
        Sentence selection algorithm. "greedy" picks top-scoring sentences
        (fast, O(n log n)). "mmr" adds a diversity penalty to reduce redundant
        content (slower, O(n²)). Default "mmr".
      zh_Hans: >
        句子选择算法。"greedy"按分数从高到低选取（快速），
        "mmr"增加多样性惩罚以减少冗余内容（较慢）。默认"mmr"。
      ja_JP: >
        文選択アルゴリズム。"greedy"はスコア順に選択（高速）、
        "mmr"は多様性ペナルティで冗長性を低減（低速）。デフォルト"mmr"。
    llm_description: >
      Sentence selection algorithm: "greedy" (fast, top-score only) or "mmr"
      (adds diversity penalty to reduce redundancy). Default "mmr".
    options:
      - value: "greedy"
        label:
          en_US: Greedy (Fast)
          zh_Hans: 贪心（快速）
          ja_JP: 貪欲（高速）
      - value: "mmr"
        label:
          en_US: MMR (Diverse)
          zh_Hans: MMR（多样）
          ja_JP: MMR（多様）
    form: form
  - name: mmr_lambda
    type: number
    required: false
    default: 0.7
    min: 0
    max: 1
    label:
      en_US: MMR Lambda
      zh_Hans: MMR多样性权重
      ja_JP: MMR多様性重み
    human_description:
      en_US: >
        Relevance vs. diversity balance for MMR selection. 0 = pure diversity
        (maximum variation), 1 = pure relevance (same as greedy). Default 0.7.
        Only applies when selection_method is "mmr".
      zh_Hans: >
        MMR选择的相关性与多样性平衡。0=纯多样性，1=纯相关性（同贪心）。
        默认0.7。仅在selection_method为"mmr"时生效。
      ja_JP: >
        MMR選択の関連性と多様性のバランス。0=純粋な多様性、
        1=純粋な関連性（貪欲と同じ）。デフォルト0.7。
        selection_methodが"mmr"の場合のみ適用。
    llm_description: >
      MMR balance parameter (0=pure diversity, 1=pure relevance). Default 0.7.
      Only used when selection_method is "mmr".
    form: form
output_schema:
  type: object
  properties:
    original_char_count:
      type: number
      description: Character count of the original input text.
    processed_char_count:
      type: number
      description: Character count of the output text.
    was_trimmed:
      type: boolean
      description: Whether the text was trimmed (true if original exceeded max_chars).
